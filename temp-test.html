<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<style>
:root{--navy:#060b35;--blue-deep:#0a2777;--blue-electric:#085cf0;--sky:#b0e9fd}
body{margin:0;background:#060b35;color:#fff;font-family:sans-serif}
.rv-stack-panel{background:rgba(255,255,255,.04);border:1px solid rgba(176,233,253,.16);border-radius:22px;padding:8px 34px;backdrop-filter:blur(12px)}
.rv-stack-row{border-bottom:1px solid rgba(176,233,253,.1)}
.rv-stack-row:last-child{border-bottom:none}
.rv-stack-toggle{display:flex;align-items:center;gap:13px;width:100%;padding:22px 0;background:none;border:none;cursor:pointer;text-align:left;color:inherit}
.rv-stack-panel-inner{overflow:hidden;display:grid;grid-template-rows:0fr;opacity:0;transition:grid-template-rows .42s cubic-bezier(.4,0,.2,1), opacity .3s ease}
.rv-stack-row.is-open .rv-stack-panel-inner{grid-template-rows:1fr;opacity:1}
.rv-stack-tools{display:flex;flex-wrap:wrap;gap:9px;padding:2px 0 26px 27px;min-height:0}
.rv-stack-tools span{padding:7px 14px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);font-size:13.5px;font-weight:600;letter-spacing:.3px;color:var(--sky)}
</style>
</head>
<body>
<div class="rv-stack-panel" data-accordion="single">
  <div class="rv-stack-row is-open" data-accordion-item data-open="true">
    <button class="rv-stack-toggle" data-accordion-toggle aria-expanded="true">IA & LLM</button>
    <div class="rv-stack-panel-inner"><div class="rv-stack-tools"><span>ChatGPT</span><span>Claude</span><span>Gemini</span></div></div>
  </div>
  <div class="rv-stack-row" data-accordion-item data-open="false">
    <button class="rv-stack-toggle" data-accordion-toggle aria-expanded="false">Automatisation</button>
    <div class="rv-stack-panel-inner"><div class="rv-stack-tools"><span>n8n</span></div></div>
  </div>
  <div class="rv-stack-row" data-accordion-item data-open="false">
    <button class="rv-stack-toggle" data-accordion-toggle aria-expanded="false">Sales & CRM</button>
    <div class="rv-stack-panel-inner"><div class="rv-stack-tools"><span>Instantly</span><span>LinkedIn</span></div></div>
  </div>
</div>
<script>
function initAccordions(){
 document.querySelectorAll('[data-accordion]').forEach((container)=>{
  const single = container.getAttribute('data-accordion')==='single';
  const items = Array.from(container.querySelectorAll('[data-accordion-item]'));
  items.forEach((item)=>{
   const toggle = item.querySelector('[data-accordion-toggle]');
   if(!toggle)return;
   toggle.addEventListener('click',()=>{
    const isOpen = item.getAttribute('data-open')==='true';
    if(single && !isOpen){
     items.forEach((other)=>{
      other.setAttribute('data-open','false');
      other.classList.remove('is-open');
      const t = other.querySelector('[data-accordion-toggle]');if(t)t.setAttribute('aria-expanded','false');
     });
    }
    const next = !isOpen;
    item.setAttribute('data-open',String(next));
    item.classList.toggle('is-open',next);
    toggle.setAttribute('aria-expanded',String(next));
   });
  });
 });
}
initAccordions();
</script>
</body>
</html>
